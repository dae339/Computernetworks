<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 600px;
            border: 2px solid #333;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }
        .header-red {
            background-color: #FF0000;
            color: white;
        }
        .row-blue {
            background-color: #009999;
            color: white;
        }
        .data-cell {
            background-color: white;
            color: black;
        }
    </style>
</head>
<body>

<table>
    <caption>Добыча драгоценных камней</caption>
    <tr class="header-red">
        <th></th>
        <th>2014</th>
        <th>2015</th>
        <th>2016</th>
    </tr>
    <tr class="row-blue">
        <td>Сапфиры</td>
        <td class="data-cell" rowspan="2">1483</td>
        <td class="data-cell">4532</td>
        <td class="data-cell">6743</td>
    </tr>
    <tr class="row-blue">
        <td>Рубины</td>
        <td class="data-cell">3835</td>
        <td class="data-cell">7482</td>
    </tr>
    <tr class="row-blue">
        <td>Алмазы</td>
        <td class="data-cell">683</td>
        <td class="data-cell" colspan="2">238</td>
    </tr>
</table>

</body>
</html>
