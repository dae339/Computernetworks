<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border-radius</title>
    <link rel="stylesheet" href="Style10.css">
</head>
<body>

    <div class="box box-1">border-radius: 50px 0 0 50px;</div>
    <div class="box box-2">border-radius: 40px 10px;</div>
    <div class="box box-3">border-radius: 13em/3em;</div>
    <div class="box box-4">border-radius: 13em 0.5em/1em 0.5em;</div>
    <div class="box box-5">border-radius: 8px;</div>

</body>
</html>
