<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблицы моделей</title>
    <link rel="stylesheet" href="Style2.css">
</head>
<body>

    <h1>Collapse</h1>
    <table class="table-collapse">
        <thead>
            <tr>
                <th>Модель</th>
                <th>Производитель</th>
                <th>Цена</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Lumia 950</td>
                <td>Microsoft</td>
                <td>29900</td>
            </tr>
            <tr>
                <td>iPhone 6S</td>
                <td>Apple</td>
                <td>52900</td>
            </tr>
            <tr>
                <td>Nexus 6P</td>
                <td>Huawei</td>
                <td>49000</td>
            </tr>
        </tbody>
    </table>

    <h1>Separate</h1>
    <table class="table-separate">
        <thead>
            <tr>
                <th>Модель</th>
                <th>Производитель</th>
                <th>Цена</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>G 5</td>
                <td>LG</td>
                <td>44900</td>
            </tr>
            <tr>
                <td>HTC 10</td>
                <td>HTC</td>
                <td>49900</td>
            </tr>
            <tr>
                <td>Nexus 5X</td>
                <td>Google/LG</td>
                <td>25000</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
